<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BikeWidget">
<link rel="manifest" href="manifest.json">
<title>BikeWidget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #1DB954; 
    --accent2: #1ed760;
    --text: #f0f0f8;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --amber: #f59e0b;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  #logo {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider-t {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border-radius: 12px;
    border: 0.5px solid var(--border);
    transition: background 0.2s;
  }
  .slider-t::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider-t { background: #11381e; }
  .toggle input:checked + .slider-t::before { transform: translateX(20px); background: var(--accent); }

  #main {
    display: flex;
    flex: 1;
    gap: 0;
    overflow: hidden;
  }

  #clock-panel {
    width: 45%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    padding: 20px 12px;
    gap: 16px;
  }

  #clock-time {
    font-size: clamp(42px, 12vw, 72px);
    font-weight: 200;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  #clock-seconds {
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 300;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  #clock-date {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  #ring-wrap {
    position: relative;
    width: 80px; height: 80px;
  }
  #ring-wrap svg { transform: rotate(-90deg); }
  #ring-bg { stroke: var(--surface2); }
  #ring-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }
  #ring-time {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  #awake-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  #awake-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
  }
  #awake-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  #awake-btn.active #awake-dot { background: var(--green); }

  #music-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    padding: 16px 14px;
    gap: 14px;
    overflow: hidden;
  }

  #now-playing-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #track-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #track-title {
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #track-artist {
    font-size: clamp(11px, 2.5vw, 14px);
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #art-wrap {
    width: 100%;
    aspect-ratio: 1;
    max-height: 120px;
    background: var(--surface2);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  #art-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #art-icon {
    font-size: 36px;
    opacity: 0.25;
  }

  #progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
  }

  #progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  #controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

	.ctrl-btn {
	  background: none;
	  border: none;
	  /* MODIFICATO: Cambiato da var(--muted) a var(--text) per avere il bianco ad alto contrasto */
	  color: var(--text); 
	  cursor: pointer;
	  padding: 12px; /* Aumentato il padding per rendere la zona di tocco più grande in bici */
	  border-radius: 50%;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  transition: color 0.15s, background 0.15s;
	  appearance: none;
	  -webkit-appearance: none;
	  font-size: 26px; /* Aumentata la dimensione dell'icona per vederla meglio */
	}

	/* Effetto al tocco: i tasti si illuminano del verde Spotify per darti un feedback visivo */
	.ctrl-btn:active { 
	  background: var(--surface2); 
	  color: var(--accent2); 
	}

  #play-btn {
    width: 52px; height: 52px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 20px;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    flex-shrink: 0;
  }
  #play-btn:active { transform: scale(0.93); }

  #spotify-connect-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    display: none;
    align-self: center;
  }

  #media-status {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.04em;
  }

  #media-status.connected { color: var(--green); }
  #media-status.error { color: var(--amber); }

  #lockscreen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    cursor: pointer;
  }
  #lockscreen.visible { display: flex; }

  #ls-time {
    font-size: clamp(56px, 18vw, 96px);
    font-weight: 100;
    color: #fff;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  #ls-date {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #ls-music {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 24px;
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #ls-track-title {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #ls-track-artist {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #ls-controls {
    display: flex;
    justify-content: center;
    gap: 24px;
    align-items: center;
  }

  .ls-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 24px;
    cursor: pointer;
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }

  #ls-play-btn {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    border: none;
    color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  #ls-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  @import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css');
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <span id="logo">🚴 BikeWidget</span>
    <div class="toggle-wrap">
      <span class="toggle-label" id="mode-label">NORMALE</span>
      <label class="toggle">
        <input type="checkbox" id="lockmode-toggle">
        <span class="slider-t"></span>
      </label>
      <span class="toggle-label">BLOCCO</span>
    </div>
  </div>

  <div id="main">
    <div id="clock-panel">
      <div>
        <div id="clock-time">00:00</div>
        <div style="display:flex;align-items:baseline;gap:6px;justify-content:center;margin-top:4px;">
          <span style="font-size:13px;color:var(--muted)">:</span>
          <span id="clock-seconds" style="font-size:clamp(24px,7vw,40px)">00</span>
        </div>
      </div>
      <div id="clock-date">—</div>

      <div id="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle id="ring-bg" cx="40" cy="40" r="34" fill="none" stroke-width="5"/>
          <circle id="ring-fill" cx="40" cy="40" r="34" fill="none" stroke-width="5"
            stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
        </svg>
        <div id="ring-time">00:00</div>
      </div>

      <button id="awake-btn">
        <span id="awake-dot"></span>
        <span id="awake-text">Schermo attivo</span>
      </button>
    </div>

    <div id="music-panel">
      <div id="now-playing-label">In riproduzione (Spotify)</div>

      <div id="art-wrap">
        <span id="art-icon">♪</span>
        <img id="art-image" alt="Album Art">
      </div>

      <div id="track-info">
        <div id="track-title">Nessuna traccia</div>
        <div id="track-artist">—</div>
      </div>

      <button id="spotify-connect-btn">Connetti a Spotify</button>

      <div id="progress-wrap">
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
        <div id="progress-times">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

			<div id="controls">
			  <!-- Pulsante Volume Giù -->
			  <button class="ctrl-btn" id="btn-vol-down" aria-label="Abbassa Volume">
			    <i class="ti ti-volume-minus" aria-hidden="true"></i>
			  </button>
			  
			  <button class="ctrl-btn" id="btn-prev" aria-label="Precedente">
			    <i class="ti ti-player-skip-back" aria-hidden="true"></i>
			  </button>
			  <button id="play-btn" aria-label="Play/Pausa">
			    <i class="ti ti-player-play" id="play-icon" aria-hidden="true"></i>
			  </button>
			  <button class="ctrl-btn" id="btn-next" aria-label="Successivo">
			    <i class="ti ti-player-skip-forward" aria-hidden="true"></i>
			  </button>

			  <!-- Pulsante Volume Su -->
			  <button class="ctrl-btn" id="btn-vol-up" aria-label="Alza Volume">
			    <i class="ti ti-volume-plus" aria-hidden="true"></i>
			  </button>
			</div>

      <div id="media-status">In attesa di Spotify...</div>
    </div>
  </div>
</div>

<div id="lockscreen" role="button" aria-label="Tocca per sbloccare">
  <div id="ls-time">00:00</div>
  <div id="ls-date">—</div>

  <div id="ls-music">
    <div style="font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:2px">In riproduzione</div>
    <div id="ls-track-title">Nessuna traccia</div>
    <div id="ls-track-artist">—</div>
    <div id="ls-controls">
      <button class="ls-btn" id="ls-prev" aria-label="Precedente">
        <i class="ti ti-player-skip-back" aria-hidden="true"></i>
      </button>
      <button id="ls-play-btn" aria-label="Play/Pausa">
        <i class="ti ti-player-play" id="ls-play-icon" aria-hidden="true"></i>
      </button>
      <button class="ls-btn" id="ls-next" aria-label="Successivo">
        <i class="ti ti-player-skip-forward" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <div id="ls-hint">Tocca per tornare all'app</div>
</div>

<script>
// ==========================================
// CONFIGURAZIONE SPOTIFY PKCE
// ==========================================
const SPOTIFY_CLIENT_ID = '7ff19c5a7f6744b8b16c84883a384e3c';
const SPOTIFY_REDIRECT_URI = window.location.origin + window.location.pathname;

// Helper crittografici per PKCE Flow
function generateRandomString(length) {
  const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const values = crypto.getRandomValues(new Uint8Array(length));
  return Array.from(values, x => possible[x % possible.length]).join('');
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return crypto.subtle.digest('SHA-256', data);
}

function base64urlencode(a) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(a)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// =====================
// CLOCK
// =====================
const DAYS = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MONTHS = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const pad = n => String(n).padStart(2,'0');

function updateClock() {
  const now = new Date();
  const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());

  document.getElementById('clock-time').textContent = `${h}:${m}`;
  document.getElementById('clock-seconds').textContent = s;
  document.getElementById('ls-time').textContent = `${h}:${m}`;

  const dateStr = `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]}`;
  document.getElementById('clock-date').textContent = dateStr;
  document.getElementById('ls-date').textContent = dateStr;
  document.getElementById('ring-time').textContent = `${h}:${m}`;

  const secInMin = now.getSeconds();
  const circumference = 213.6;
  const offset = circumference - (secInMin / 60) * circumference;
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
}
setInterval(updateClock, 1000);
updateClock();

// =====================
// WAKE LOCK
// =====================
let wakeLock = null;
const awakeBtn = document.getElementById('awake-btn');
const awakeText = document.getElementById('awake-text');

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      awakeBtn.classList.add('active');
      awakeText.textContent = 'Schermo bloccato ON';
      wakeLock.addEventListener('release', () => {
        awakeBtn.classList.remove('active');
        awakeText.textContent = 'Schermo attivo';
        wakeLock = null;
      });
    } catch(e) { awakeText.textContent = 'Non supportato'; }
  } else { awakeText.textContent = 'Non supportato'; }
}

async function releaseWakeLock() {
  if (wakeLock) { await wakeLock.release(); }
  awakeBtn.classList.remove('active'); awakeText.textContent = 'Schermo attivo';
}
awakeBtn.addEventListener('click', () => { if (wakeLock) releaseWakeLock(); else requestWakeLock(); });

// =====================
// LOGICA PLAYER E API SPOTIFY
// =====================
let accessToken = null;
let isPlaying = false;
let progressMs = 0;
let durationMs = 0;
let progressInterval = null;

const trackTitle = document.getElementById('track-title');
const trackArtist = document.getElementById('track-artist');
const lsTitle = document.getElementById('ls-track-title');
const lsArtist = document.getElementById('ls-track-artist');
const artIcon = document.getElementById('art-icon');
const artImage = document.getElementById('art-image');
const playIcon = document.getElementById('play-icon');
const lsPlayIcon = document.getElementById('ls-play-icon');
const progressFill = document.getElementById('progress-bar-fill');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const statusEl = document.getElementById('media-status');
const connectBtn = document.getElementById('spotify-connect-btn');

function fmtTime(ms) {
  if (!ms || isNaN(ms)) return '0:00';
  const sec = Math.floor(ms / 1000);
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${pad(s)}`;
}

// Avvia il Login Ufficiale PKCE autorizzato da Spotify
async function loginToSpotify() {
  const codeVerifier = generateRandomString(64);
  const hashed = await sha256(codeVerifier);
  const codeChallenge = base64urlencode(hashed);

  localStorage.setItem('spotify_code_verifier', codeVerifier);

  const scopes = 'user-read-playback-state user-modify-playback-state';
  const authUrl = new URL("https://accounts.spotify.com/authorize");

  const params = {
    response_type: 'code',
    client_id: SPOTIFY_CLIENT_ID,
    scope: scopes,
    redirect_uri: SPOTIFY_REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: codeChallenge,
  };

  authUrl.search = new URLSearchParams(params).toString();
  window.location.href = authUrl.toString();
}

// Scambia il codice temporaneo nell'URL con un vero Access Token funzionante
async function exchangeCodeForToken(code) {
  const codeVerifier = localStorage.getItem('spotify_code_verifier');

  const payload = {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      grant_type: 'authorization_code',
      code: code,
      redirect_uri: SPOTIFY_REDIRECT_URI,
      code_verifier: codeVerifier
    }),
  };

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', payload);
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('spotify_token', accessToken);
      if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
      return true;
    }
  } catch (e) { console.error(e); }
  return false;
}

async function spotifyFetch(endpoint, method = 'GET') {
  try {
    const res = await fetch(`https://api.spotify.com/v1/${endpoint}`, {
      method: method,
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    if (res.status === 401) {
      statusEl.textContent = 'Sincronizzazione scaduta. Riconnetti.';
      statusEl.className = 'error';
      connectBtn.style.display = 'block';
      return null;
    }
    if (res.status === 204) return true;
    return await res.json();
  } catch (e) { return null; }
}

function startLocalProgress() {
  clearInterval(progressInterval);
  if (!isPlaying) return;
  progressInterval = setInterval(() => {
    if (progressMs < durationMs) {
      progressMs += 1000;
      updateProgressUi();
    }
  }, 1000);
}

function updateProgressUi() {
  timeCurrent.textContent = fmtTime(progressMs);
  const percent = durationMs > 0 ? (progressMs / durationMs) * 100 : 0;
  progressFill.style.width = `${percent}%`;
}

async function getCurrentlyPlaying() {
  if (!accessToken) return;
  const data = await spotifyFetch('me/player');
  
  if (data && data.item) {
    connectBtn.style.display = 'none';
    statusEl.textContent = 'Spotify Connesso';
    statusEl.className = 'connected';

    trackTitle.textContent = data.item.name;
    lsTitle.textContent = data.item.name;
    const artists = data.item.artists.map(a => a.name).join(', ');
    trackArtist.textContent = artists;
    lsArtist.textContent = artists;

    durationMs = data.item.duration_ms;
    progressMs = data.progress_ms;
    timeTotal.textContent = fmtTime(durationMs);
    updateProgressUi();

    isPlaying = data.is_playing;
    const iconClass = isPlaying ? 'ti-player-pause' : 'ti-player-play';
    playIcon.className = `ti ${iconClass}`;
    lsPlayIcon.className = `ti ${iconClass}`;

    if (data.item.album.images && data.item.album.images.length > 0) {
      artImage.src = data.item.album.images[0].url;
      artImage.style.display = 'block';
      artIcon.style.display = 'none';
    }
    startLocalProgress();
  } else {
    statusEl.textContent = 'Nessun brano attivo. Avvia Spotify sul telefono.';
    statusEl.className = '';
  }
}

document.getElementById('play-btn').addEventListener('click', async () => {
  if (!accessToken) return;
  const endpoint = isPlaying ? 'me/player/pause' : 'me/player/play';
  await spotifyFetch(endpoint, 'PUT');
  isPlaying = !isPlaying;
  const iconClass = isPlaying ? 'ti-player-pause' : 'ti-player-play';
  playIcon.className = `ti ${iconClass}`;
  lsPlayIcon.className = `ti ${iconClass}`;
  startLocalProgress();
  setTimeout(getCurrentlyPlaying, 400);
});

document.getElementById('btn-prev').addEventListener('click', async () => {
  await spotifyFetch('me/player/previous', 'POST');
  setTimeout(getCurrentlyPlaying, 400);
});

document.getElementById('btn-next').addEventListener('click', async () => {
  await spotifyFetch('me/player/next', 'POST');
  setTimeout(getCurrentlyPlaying, 400);
});

document.getElementById('ls-play-btn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('play-btn').click(); });
document.getElementById('ls-prev').addEventListener('click', e => { e.stopPropagation(); document.getElementById('btn-prev').click(); });
document.getElementById('ls-next').addEventListener('click', e => { e.stopPropagation(); document.getElementById('btn-next').click(); });
connectBtn.addEventListener('click', loginToSpotify);

// Controllo dei parametri nell'URL per catturare il codice d'accesso generato da Spotify
async function initAuth() {
  const args = new URLSearchParams(window.location.search);
  const code = args.get('code');

  if (code) {
    // Trovato il codice nell'URL, lo scambiamo con il Token definitivo
    statusEl.textContent = 'Autenticazione in corso...';
    const success = await exchangeCodeForToken(code);
    if (success) {
      // Puliamo l'URL dai parametri per un aspetto pulito della PWA
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  } else {
    accessToken = localStorage.getItem('spotify_token');
  }

  if (!accessToken) {
    connectBtn.style.display = 'block';
    statusEl.textContent = 'Connessione a Spotify richiesta.';
  } else {
    setInterval(getCurrentlyPlaying, 3000);
    getCurrentlyPlaying();
  }
}

initAuth();

// =====================
// LOCKSCREEN MODE
// =====================
const lockscreen = document.getElementById('lockscreen');
const lockmodeToggle = document.getElementById('lockmode-toggle');

lockmodeToggle.addEventListener('change', () => {
  if (lockmodeToggle.checked) {
    lockscreen.classList.add('visible');
    document.getElementById('mode-label').textContent = 'NORMALE';
  } else {
    lockscreen.classList.remove('visible');
    document.getElementById('mode-label').textContent = 'BLOCCO';
  }
});

lockscreen.addEventListener('click', () => {
  lockscreen.classList.remove('visible');
  lockmodeToggle.checked = false;
  document.getElementById('mode-label').textContent = 'NORMALE';
});

lockscreen.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
